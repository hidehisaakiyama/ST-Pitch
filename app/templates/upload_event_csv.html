<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Event CSV</title>
</head>
<body>
    <h1>Upload Event CSV Files</h1>

    <form method="post" action="{{ url_for('main.upload_event_csv') }}" enctype="multipart/form-data">
        <label for="file">CSV File (.csv):</label>
        <input type="file" name="file" accept=".csv" multiple required>
        <button type="submit">Upload</button>
    </form>

    <p><a href="{{ url_for('main.index') }}">&larr; Back to Top Page</a></p>
</body>
</html>
