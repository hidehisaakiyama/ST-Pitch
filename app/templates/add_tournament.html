<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会追加 - ChronoPitch</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title mb-0">🏆 大会追加</h3>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('main.add_tournament') }}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">大会名</label>
                                <input type="text" class="form-control" id="name" name="name" required placeholder="例: ロボカップ2024">
                            </div>
                            
                            <div class="mb-3">
                                <label for="year" class="form-label">開催年</label>
                                <input type="number" class="form-control" id="year" name="year" required min="2020" max="2030" value="2024">
                            </div>
                            
                            <div class="mb-3">
                                <label for="start_date" class="form-label">開始日</label>
                                <input type="date" class="form-control" id="start_date" name="start_date" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="end_date" class="form-label">終了日</label>
                                <input type="date" class="form-control" id="end_date" name="end_date" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">✅ 大会を登録</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">🏠 ホームに戻る</a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
